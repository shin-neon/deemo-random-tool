<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141016" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; object-src 'none';" />
  <title>DEEMO 抽選ツール</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">DEEMO -Reborn- 非公式補助ツール v0.90</p>
        <h1 id="appTitle">🗳️抽選箱🗳️</h1>
      </div>
    </header>

    <section id="randomView" class="view is-active" aria-label="抽選">
      <section class="card hero-card">
        <h2>抽選条件</h2>

        <div class="field-group">
          <p class="field-title">パック</p>
          <div class="radio-choice-grid">
            <label class="radio-row">
              <input type="radio" name="packMode" value="all" checked />
              <span>全パック</span>
            </label>
            <label class="radio-row">
              <input type="radio" name="packMode" value="custom" />
              <span>パックを選択</span>
            </label>
          </div>
        </div>

        <div id="packCheckboxArea" class="checkbox-area is-hidden"></div>

        <div class="field-group">
          <p class="field-title">難易度</p>
          <div class="radio-choice-grid">
            <label class="radio-row">
              <input type="radio" name="difficultyMode" value="all" checked />
              <span>全て</span>
            </label>
            <label class="radio-row">
              <input type="radio" name="difficultyMode" value="custom" />
              <span>難易度を選択</span>
            </label>
          </div>
        </div>

        <div id="difficultyCheckboxArea" class="chip-area is-hidden">
          <label class="chip"><input type="checkbox" value="Easy" />Easy</label>
          <label class="chip"><input type="checkbox" value="Normal" />Normal</label>
          <label class="chip"><input type="checkbox" value="Hard" />Hard</label>
        </div>

        <div class="level-grid">
          <label class="input-label">最小Lv
            <input id="minLevelInput" type="number" min="1" max="11" value="1" />
          </label>
          <label class="input-label">最大Lv
            <input id="maxLevelInput" type="number" min="1" max="11" value="11" />
          </label>
        </div>

        <button id="randomButton" class="primary-button" type="button">抽選</button>
      </section>

      <section id="resultCard" class="result-card is-empty">
        <p class="empty-text">条件を選んで「抽選」を押してください。</p>
      </section>

      <button id="copyButton" class="secondary-button" type="button" disabled>twitchチャット用に結果コピー</button>
    </section>

    <section id="listView" class="view" aria-label="楽曲検索">
      <section class="card sticky-tools">
        <label class="input-label">検索
          <input id="searchInput" type="search" placeholder="曲名・アーティスト・Lvで検索" />
        </label>
        <label class="input-label">パック表示
          <select id="listPackSelect"></select>
        </label>
        <p id="songCount" class="song-count"></p>
        <p class="song-count">楽曲カードを長押しすると曲情報をコピーできます。</p>
      </section>
      <section id="songList" class="song-list"></section>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="画面切替">
    <button class="nav-button is-active" data-view="randomView" type="button">抽選</button>
    <button class="nav-button" data-view="listView" type="button">楽曲検索</button>
  </nav>

  <script src="./songs.js"></script>
  <script src="./script.js"></script>
</body>
</html>
